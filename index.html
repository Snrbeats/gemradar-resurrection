<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GemRadar: Resurrection</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#0a0514" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div style="position:fixed;top:-10%;left:-10%;width:40%;height:40%;background:rgba(188,19,254,0.1);filter:blur(100px);border-radius:50%;z-index:-1;pointer-events:none"></div>
  <div style="position:fixed;bottom:-10%;right:-10%;width:40%;height:40%;background:rgba(57,255,20,0.05);filter:blur(100px);border-radius:50%;z-index:-1;pointer-events:none"></div>
  
  <aside class="sidebar">
    <h1>GemRadar</h1>
    <button class="tab active" data-tab="home">Resurrection Feed</button>
    <button class="tab" data-tab="search">Search</button>
    <button class="tab" data-tab="dailymix">Daily Reroll</button>
    <button class="tab" data-tab="picks">My Discoveries</button>
    <button class="tab" data-tab="artist">Artist</button>
    <a href="https://radiov2-six.vercel.app/" class="tab" target="_blank" style="text-decoration:none;display:flex;align-items:center;gap:8px">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
      Radio V2
    </a>
    <div class="box">
      <label>API Key</label>
      <input id="apiKey" type="password" placeholder="Audius API Key"/>
      <button id="saveKey">Save</button>
    </div>
    <div class="box">
      <label>Handle (V2 auth placeholder)</label>
      <input id="handleInput" placeholder="your_handle" />
      <button id="saveHandle">Connect</button>
      <small id="authStatus">Not connected</small>
      <p style="margin-top:8px; font-size:11px; color:var(--muted); line-height:1.4; border-top:1px solid var(--line); padding-top:8px">
        <strong>How to find your API Key:</strong><br>
        Audius Profile > Settings > Developer Settings > Create App.
      </p>
    </div>
  </aside>

  <main>
    <header>
      <h2 id="title">Home</h2>
      <div class="searchbar">
        <input id="searchInput" placeholder="Search tracks or artists" />
        <button id="searchBtn">Go</button>
      </div>
    </header>

    <section id="home" class="panel"></section>
    <section id="search" class="panel hidden"></section>
    <section id="library" class="panel hidden"></section>
    <section id="smart" class="panel hidden"></section>
    <section id="dailymix" class="panel hidden"></section>
    <section id="picks" class="panel hidden"></section>
    <section id="artist" class="panel hidden"></section>
  </main>

  <!-- Spotify-style Player -->
  <footer class="player">
    <!-- Left: Track Info -->
    <div class="player-left">
      <img id="cover" alt="cover" />
      <div class="track-info">
        <div id="nowTitle">No track</div>
        <div id="nowArtist">—</div>
      </div>
      <button id="likeBtn" class="like-btn">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
      </button>
    </div>

    <!-- Center: Playback Controls -->
    <div class="player-center">
      <div class="control-buttons">
        <button id="shuffleBtn" class="control-btn" title="Shuffle">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"></path></svg>
        </button>
        <button id="prevBtn" class="control-btn" title="Previous">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"></path></svg>
        </button>
        <button id="playPauseBtn" class="play-pause-btn" title="Play/Pause">
          <svg id="playIcon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M8 5v14l11-7z"></path></svg>
          <svg id="pauseIcon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path></svg>
        </button>
        <button id="nextBtn" class="control-btn" title="Next">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"></path></svg>
        </button>
        <button id="repeatBtn" class="control-btn" title="Repeat">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"></path></svg>
        </button>
      </div>
      <div class="progress-container">
        <span id="currentTime">0:00</span>
        <div class="progress-bar-wrapper">
          <div class="progress-bar-bg">
            <div id="progressBar" class="progress-bar-fill"></div>
          </div>
          <input type="range" id="seekSlider" min="0" max="100" value="0" class="seek-slider">
        </div>
        <span id="duration">0:00</span>
      </div>
    </div>

    <!-- Right: Volume & Extra -->
    <div class="player-right">
      <button id="queueBtn" class="control-btn" title="Queue">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M4 10h12v2H4zm0-4h12v2H4zm0 8h8v2H4zm10 0v6l5-3z"></path></svg>
      </button>
      <div class="volume-container">
        <button id="muteBtn" class="control-btn" title="Mute">
          <svg id="volHighIcon" viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"></path></svg>
          <svg id="volMuteIcon" viewBox="0 0 24 24" width="16" height="16" fill="currentColor" style="display:none"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73 4.27 3zM12 4L9.91 6.09 12 8.18V4z"></path></svg>
        </button>
        <div class="volume-bar-wrapper">
          <div class="volume-bar-bg">
            <div id="volumeBar" class="volume-bar-fill"></div>
          </div>
          <input type="range" id="volumeSlider" min="0" max="100" value="100" class="volume-slider">
        </div>
      </div>
    </div>

    <!-- Hidden audio element -->
    <audio id="audio"></audio>
  </footer>

  <script type="module" src="./app-v2.5.js"></script>
  <small style="position:fixed;bottom:10px;right:10px;opacity:0.3;font-size:10px;pointer-events:none">v2.5 (Clean)</small>
</body>
</html>
